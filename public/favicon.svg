<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Top Face of Isometric Cube -->
    <linearGradient id="topGrad" x1="256" y1="70" x2="256" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Left Face of Isometric Cube -->
    <linearGradient id="leftGrad" x1="100" y1="160" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Right Face of Isometric Cube -->
    <linearGradient id="rightGrad" x1="412" y1="160" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Trend line / Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="90" y1="370" x2="430" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Glow filter for sales arrow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Clean dark circular background frame optimized for light/dark browser tabs -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>

  <!-- Isometric Cube Structure -->
  <g transform="translate(0, -10)">
    <!-- Top Face -->
    <path d="M256 80 L412 170 L256 260 L100 170 Z" fill="url(#topGrad)"/>
    <!-- Left Face -->
    <path d="M100 170 L256 260 L256 420 L100 330 Z" fill="url(#leftGrad)"/>
    <!-- Right Face -->
    <path d="M412 170 L256 260 L256 420 L412 330 Z" fill="url(#rightGrad)"/>
  </g>

  <!-- Upward Trend Sales Line -->
  <path d="M90 380 L200 280 L295 340 L420 160" stroke="url(#arrowGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Arrow Head pointing up-right -->
  <path d="M350 160 H420 V230" stroke="url(#arrowGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>